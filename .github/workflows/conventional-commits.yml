name: Conventional Commits Check

on:
  pull_request:
    types:
      - opened
      - synchronize
      - edited

permissions:
  pull-requests: write
  checks: write

jobs:
  check-title:
    name: Check PR Title
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            chore
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: |
            El título del PR debe seguir el formato Conventional Commits.

            Ejemplos válidos:
            - feat: añadir página de detalle de producto
            - fix: corregir cálculo de total del carrito
            - feat(auth): implementar interceptor JWT
            - fix(store): resolver selector de productos

            El formato es: tipo(scope opcional): descripción en español

            Tipos válidos: feat, fix, docs, style, refactor, perf, test, chore
