name: Auto-merge to develop

on:
  pull_request_review:
    types:
      - submitted

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge feature to develop
    runs-on: ubuntu-latest

    # Solo ejecutar cuando se aprueba un PR que apunta a develop
    if: |
      github.event.review.state == 'approved' &&
      github.event.pull_request.base.ref == 'develop' &&
      github.event.pull_request.draft == false

    steps:
      - name: Check branch prefix
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const headRef = context.payload.pull_request.head.ref;

            // Prefijos permitidos para auto-merge a develop
            const allowedPrefixes = ['feature/', 'bugfix/', 'fix/', 'refactor/', 'hotfix/', 'docs/', 'chore/'];
            const isValidBranch = allowedPrefixes.some(prefix => headRef.startsWith(prefix));

            if (!isValidBranch) {
              console.log(`Branch "${headRef}" does not match allowed prefixes — skipping auto-merge`);
              return { shouldMerge: false };
            }

            console.log(`Branch "${headRef}" is valid — enabling auto-merge`);
            return { shouldMerge: true };

      - name: Enable auto-merge
        # --auto delegates to GitHub: merges when all required checks pass
        if: fromJSON(steps.check.outputs.result).shouldMerge == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --auto \
            --merge \
            --delete-branch \
            --repo ${{ github.repository }}
