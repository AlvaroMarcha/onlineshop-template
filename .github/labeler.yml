styles:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.css'
      - 'src/styles.css'

i18n:
  - changed-files:
    - any-glob-to-any-file: 'src/assets/i18n/**'

documentation:
  - changed-files:
    - any-glob-to-any-file:
