frontend:
  - changed-files:
    - any-glob-to-any-file: 'src/**'

components:
  - changed-files:
    - any-glob-to-any-file: 'src/app/components/**'

views:
  - changed-files:
    - any-glob-to-any-file: 'src/app/views/**'

store:
  - changed-files:
    - any-glob-to-any-file: 'src/app/store/**'

services:
  - changed-files:
    - any-glob-to-any-file: 'src/app/services/**'

auth:
  - changed-files:
    - any-glob-to-any-file:
      - 'src/app/store/auth/**'
      - 'src/app/guards/**'
      - 'src/app/interceptors/**'
      - 'src/app/components/loginCard/**'
