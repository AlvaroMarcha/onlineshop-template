<div class="flex flex-col sm:flex-row w-full mt-5 mb-20 gap-8">
  <!-- Sidebar -->
  <aside class="w-full sm:basis-1/6 sm:ml-10">
    <div class="card flex justify-center">
      <div class="w-full" [style]="{width: isMobile ? '300px' : '250px'}">
        <h3 class="font-bold mb-4">Categorías</h3>
        <div class="flex flex-col gap-1">
          @for (item of items; track item.label) {
            @if (item.items) {
              @for (subItem of item.items; track subItem.label) {
                <m-button
                  [label]="subItem.label"
                  [icon]="subItem.icon || 'lucide:tag'"
                  variant="text"
                  [full]="true"
                  styleClass="justify-start"
                />
              }
            }
          }
        </div>
      </div>
    </div>
  </aside>

  <!-- Productos -->
  <div class="flex flex-wrap justify-center sm:justify-start gap-10 flex-1">
    @for(product of products$(); track product.id) {
    <div class="catCard" [style]="{width: isMobile ? '300px' : '240px'}">
      <a href="#">
        <img [src]="product.urlImg" alt="{{product.name}}" class="w-full object-cover" />
      </a>

      <div class="lowerCatCard">
        <h4 [style]="{color: isDarkMode ? 'lightgreen' : '#32CD32'}">
          {{ product.category }}
        </h4>
        <h3 class="text-lg h-[60px] mb-1 text-white">{{ product.name }}</h3>
        <p [style]="{ height: '140px', color: 'white'}">
          {{ product.description }}
        </p>
        <p
          [style]="{fontWeight: 'bold', fontSize: '20px', color: isDarkMode ? '#FFD700' : '#FFD700'}"
        >
          {{product.price}} <span class="text-yellow-200">€</span>
        </p>
        <div class="flex flex-row justify-start gap-2 mt-4">
          <m-button
            severity="success"
            label="Añadir"
            (onClick)="addCart(product.id)"
            icon="lucide:shopping-cart"
          />
          <m-button
            severity="info"
            label="Ver"
            variant="outlined"
            icon="lucide:eye"
          />
        </div>
      </div>
    </div>
    }
  </div>
</div>
