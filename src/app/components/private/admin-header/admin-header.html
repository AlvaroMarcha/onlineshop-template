<header class="admin-header">

  <!-- Toggle button -->
  <button
    class="header-toggle"
    (click)="onToggle()"
    [attr.aria-label]="'admin.header.toggle_sidebar' | translate"
    type="button"
  >
    <m-icon [icon]="collapsed() ? 'lucide:panel-left-open' : 'lucide:panel-left-close'" size="20" />
  </button>

  <!-- Section title (breadcrumb) -->
  <span class="header-title">{{ currentSection() | translate }}</span>

  <!-- Right actions -->
  <div class="header-actions">
    @if (user(); as u) {
      <div class="header-user">
        <span class="header-username">{{ u.name }} {{ u.surname }}</span>
        <m-avatar [label]="userInitials()" size="normal" shape="circle" />
      </div>
    }

    <button
      class="header-logout"
      (click)="onLogout()"
      [attr.aria-label]="'admin.header.logout' | translate"
      [title]="'admin.header.logout' | translate"
      type="button"
    >
      <m-icon icon="lucide:log-out" size="18" />
    </button>
  </div>

</header>
