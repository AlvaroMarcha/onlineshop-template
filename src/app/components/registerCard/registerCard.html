<m-card class="register-card" [header]="'register.title' | translate">
  <form [formGroup]="registerForm">
    <div class="flex flex-row gap-4">
      <m-input
        styleClass="w-1/2"
        formControlName="name"
        type="text"
        [placeholder]="'register.form.name' | translate"
      />
      <m-input
        styleClass="flex-1"
        formControlName="surnames"
        type="text"
        [placeholder]="'register.form.surnames' | translate"
      />
    </div>
    <m-input
      styleClass="w-full"
      formControlName="username"
      type="text"
      [placeholder]="'register.form.username' | translate"
    />
    <m-input
      styleClass="w-full"
      formControlName="email"
      type="email"
      [placeholder]="'register.form.email' | translate"
    />
    <m-input
      styleClass="w-full"
      formControlName="phone"
      type="tel"
      [placeholder]="'register.form.phone' | translate"
    />
    <div class="mt-10">
      <m-password
        styleClass="w-full"
        formControlName="password"
        [placeholder]="'register.form.password' | translate"
      />
      <m-password
        styleClass="w-full"
        formControlName="confirmPassword"
        [placeholder]="'register.form.confirm_password' | translate"
      />
    </div>
    <div class="card flex justify-start m-2">
      <div class="flex flex-col gap-4" formArrayName="termsList">
        @for (term of legal; track term.name; let i = $index) {
        <div class="flex items-center">
          <m-checkbox
            [formControlName]="i"
            [label]="term.label | translate"
          />
        </div>
        }
      </div>
    </div>
  </form>
  <br />
  @if(registerForm.invalid && registerForm.touched) {
    @if(registerForm.hasError('passwordsMismatch')) {
    <div class="flexbox w-full mb-5">
      <m-message severity="warn" [title]="'validation.passwords_mismatch' | translate" />
    </div>
    } @else {
    <div class="flexbox w-full mb-5">
      <m-message severity="error" [title]="'validation.required' | translate" />
    </div>
    }
  }
  @if(termsError) {
  <div class="flexbox w-full mb-5">
    <m-message severity="warn" [title]="'validation.terms_required' | translate" />
  </div>
  }
  <m-button
    styleClass="w-full"
    [label]="'register.form.register_button' | translate"
    icon="lucide:user-plus"
    iconPos="left"
    size="small"
    [loading]="loading"
    (onClick)="onRegister()"
  />
  <m-button
    styleClass="w-full mt-2"
    [label]="'register.form.login_link' | translate"
    (onClick)="router.navigate(['/login'])"
    [link]="true"
  />
</m-card>
