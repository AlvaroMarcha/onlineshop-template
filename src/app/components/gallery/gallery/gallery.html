<div class="card mx-auto pt-10" style="max-width: 900px">
  @if(pagedImages.length > 0){
  <div class="grid grid-cols-12 gap-4">
    @for(image of pagedImages; track image.title; let i=$index){

    <div class="col-span-12 sm:col-span-6 md:col-span-4 lg:col-span-3">
      <img
        [src]="image.thumbnailImageSrc || image.itemImageSrc"
        [alt]="image.alt || image.title || ''"
        style="cursor: pointer; width: 100%; height: 180px; object-fit: cover"
        (click)="openAt(i)"
      />
      <div class="mt-2 text-sm text-center text-gray-600">
        {{ image.title }}
      </div>
    </div>
    }
  </div>
  }
</div>
<div class="flex flex-row justify-center mt-6">
  <!-- Simple fullscreen dialog -->
  <m-dialog
    [(visible)]="displayCustom"
    [closeable]="true"
    size="xl"
  >
    <div>
      <m-message severity="info" [title]="pagedImages[activeIndexPage].title || ''" />
      <img
        [src]="pagedImages[activeIndexPage].itemImageSrc"
        [alt]="pagedImages[activeIndexPage].alt || pagedImages[activeIndexPage].title || ''"
        style="width: 100%; height: 600px; object-fit: contain; display: block"
      />
      <div class="flex justify-between mt-4">
        <m-button
          icon="lucide:chevron-left"
          label="Anterior"
          (onClick)="activeIndexPage = (activeIndexPage - 1 + pagedImages.length) % pagedImages.length"
        />
        <m-button
          icon="lucide:chevron-right"
          iconPos="right"
          label="Siguiente"
          (onClick)="activeIndexPage = (activeIndexPage + 1) % pagedImages.length"
        />
      </div>
    </div>
  </m-dialog>
</div>
<div class="card flex justify-center mt-10 mb-20">
  <!-- Simple pagination -->
  <div class="flex gap-2 items-center">
    <m-button
      label="Anterior"
      icon="lucide:chevron-left"
      variant="outlined"
      [disabled]="first === 0"
      (onClick)="first = Math.max(0, first - rows)"
    />
    <span class="text-sm">
      Mostrando {{first + 1}} - {{Math.min(first + rows, totalRecords)}} de {{totalRecords}}
    </span>
    <m-button
      label="Siguiente"
      icon="lucide:chevron-right"
      iconPos="right"
      variant="outlined"
      [disabled]="first + rows >= totalRecords"
      (onClick)="first = Math.min(totalRecords - rows, first + rows)"
    />
  </div>
</div>
