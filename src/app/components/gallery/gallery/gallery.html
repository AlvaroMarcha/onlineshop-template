<div class="card mx-auto pt-10" style="max-width: 900px">
  @if(pagedImages.length > 0){
  <div class="grid grid-cols-12 gap-4">
    @for(image of pagedImages; track image.title; let i=$index){

    <div class="col-span-12 sm:col-span-6 md:col-span-4 lg:col-span-3">
      <img
        [src]="image.thumbnailImageSrc || image.itemImageSrc"
        [alt]="image.alt || image.title || ''"
        style="cursor: pointer; width: 100%; height: 180px; object-fit: cover"
        (click)="openAt(i)"
      />
      <div class="mt-2 text-sm text-center text-gray-600">
        {{ image.title }}
      </div>
    </div>
    }
  </div>
  }
</div>
<div class="flex flex-row justify-center mt-6">
  <p-galleria
    [value]="pagedImages"
    [(visible)]="displayCustom"
    [(activeIndex)]="activeIndexPage"
    [responsiveOptions]="responsiveOptions"
    [containerStyle]="{ 'max-width': '850px' }"
    [numVisible]="rows"
    [circular]="true"
    [showItemNavigators]="true"
    [showThumbnails]="false"
  >
    <ng-template pTemplate="item" let-item>
      <div>
        <p-message severity="secondary">
          <span>{{ item.title }}</span>
        </p-message>
        <img
          [src]="item.itemImageSrc"
          [alt]="item.alt || item.title || ''"
          style="width: 100%; height: 600px; display: block"
        />
      </div>
    </ng-template>
  </p-galleria>
</div>
<div class="card flex justify-center mt-10 mb-20">
  <p-paginator
    [first]="first"
    [rows]="rows"
    [totalRecords]="totalRecords"
    [rowsPerPageOptions]="[4, 8, 12]"
    (onPageChange)="onPageChange($event)"
  />
</div>
