<div class="reviews-section">

  <h3 class="reviews-section__title">Reseñas</h3>

  <!-- ── Lista de reseñas ──────────────────────────────────────────── -->
  @if (_isEmpty()) {
    <div class="reviews-section__empty">
      <m-icon icon="lucide:message-square-off" size="2.5rem" />
      <p>Aún no hay reseñas. ¡Sé el primero!</p>
    </div>
  } @else {
    <div class="reviews-list">
      @for (review of _reviews(); track $index; let idx = $index) {
        <div class="review-item">
          <!-- Avatar -->
          <m-avatar
            [image]="review.avatar"
            [label]="review.user"
            size="xlarge"
            class="review-item__avatar"
          />

          <!-- Contenido -->
          <div class="review-item__body">
            <div class="review-item__header">
              <span class="review-item__user">{{ review.user }}</span>
              @if (isOwn(review)) {
                <span class="review-item__badge">Tú</span>
              }
              <span class="review-item__date">{{ review.date }}</span>
            </div>
            <m-rating [value]="review.rating" [readonly]="true" size="sm" />
            <p class="review-item__text">{{ review.review }}</p>
          </div>

          <!-- Acciones propias -->
          @if (isOwn(review)) {
            <div class="review-item__actions">
              <m-button
                icon="lucide:file-edit"
                size="small"
                variant="outlined"
                (onClick)="startEdit(idx)"
              />
              <m-button
                icon="lucide:trash-2"
                size="small"
                variant="outlined"
                severity="danger"
                (onClick)="deleteReview(idx)"
              />
            </div>
          }
        </div>

        @if (!$last) {
          <m-divider />
        }
      }
    </div>
  }

  <!-- ── Botón añadir reseña ────────────────────────────────────────── -->
  <div class="reviews-section__cta">
    <m-button
      label="Añadir reseña"
      icon="lucide:plus"
      (onClick)="openAddDialog()"
    />
  </div>

</div>

<!-- ── Dialog nueva reseña ──────────────────────────────────────────── -->
<m-composer
  mode="dialog"
  dialogHeader="Nueva reseña"
  placeholder="Escribe tu reseña aquí..."
  [withRating]="true"
  [minLength]="10"
  [maxLength]="500"
  [(open)]="_addDialogOpen"
  (submitted)="onReviewSubmit($event)"
/>

<!-- ── Dialog editar reseña ─────────────────────────────────────────── -->
@if (_editDraft()) {
  <m-composer
    mode="dialog"
    dialogHeader="Editar reseña"
    placeholder="Escribe tu reseña aquí..."
    [withRating]="true"
    [minLength]="10"
    [maxLength]="500"
    [(open)]="_editDialogOpen"
    (submitted)="onEditSubmit($event)"
  />
}
