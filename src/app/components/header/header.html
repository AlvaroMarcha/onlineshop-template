<div class="card" id="header">
  <p-menubar [model]="items">
    <ng-template pTemplate="start">
      <p-image
        class="rounded-full"
        id="principal-logo"
        src="logos/principal.jpg"
        alt="Principal logo"
        width="50"
      />
    </ng-template>
    <ng-template pTemplate="end">
      <div class="flex flex-row items-center gap-3">
        <!-- Dark/Light -->
        <p-toggleButton
          [(ngModel)]="isDarkMode"
          onLabel="Oscuro"
          offLabel="Claro"
          [onIcon]="'pi pi-moon'"
          offIcon="pi pi-sun"
          size="small"
          styleClass="min-w-10"
          (ngModelChange)="toggleDarkMode()"
        ></p-toggleButton>

        <!-- Cart badge -->
        <div class="relative flex items-center justify-center">
          @if (itemsCartCount() > 0) {
          <p-overlayBadge [value]="itemsCartCount()" badgeSize="small">
            <p-button
              icon="pi pi-cart-minus"
              [rounded]="true"
              (click)="showDialog()"
              link
            ></p-button>
          </p-overlayBadge>
          } @else {
          <p-button
            icon="pi pi-cart-minus"
            [rounded]="true"
            (click)="showDialog()"
            link
          ></p-button>
          }
        </div>

        <!-- User -->
        @if (this.isLogged()) {
        <p-button
          severity="help"
          icon="pi pi-user"
          [rounded]="true"
          (click)="menuClients.toggle($event)"
        />
        <p-tieredmenu #menuClients [model]="clientItems" [popup]="true" />
        } @else {
        <p-button
          icon="pi pi-user"
          [rounded]="true"
          (click)="menu.toggle($event)"
        />
        <p-tieredmenu #menu [model]="itemsTiered" [popup]="true" />
        }
      </div>
    </ng-template>
  </p-menubar>

  <!-- Cart Dialog -->
  <p-dialog
    styleClass="w-full md:max-w-[35rem] "
    [modal]="true"
    [(visible)]="visible"
    position="bottomright"
    [baseZIndex]="10000"
    [draggable]="false"
    [resizable]="false"
    [dismissableMask]="true"
  >
    <ng-template pTemplate="header">
      <div class="flex flex-row justify-center-safe w-full items-center">
        <p class="text-2xl">{{'cart.title' | translate}}</p>
        <p class="text-xl text- ml-4">
          Total:
          <span class="text-amber-200 font-bold"
            >{{totalAmount()?.toFixed(2)}}</span
          >
          €
        </p>
      </div>
    </ng-template>
    <div class="px-4 pb-4">
      <app-cart></app-cart>
    </div>

    <ng-template pTemplate="footer">
      <div class="flex flex-col md:flex-row w-full">
        <p-button
          styleClass="flex w-full md:w-[350px]"
          [label]="'cart.checkout_button' | translate"
        ></p-button>
        <p-button
          styleClass="flex w-full md:ml-2 mt-2 md:mt-0"
          [label]="'cart.empty' | translate"
          severity="danger"
          (onClick)="clearCart()"
          (click)="visible = false; showToastEmtpyCart()"
        />
      </div>
    </ng-template>
  </p-dialog>

  <div class="card flex justify-center">
    <p-toast [breakpoints]="{ '920px': { width: '90%' } }" />
  </div>
</div>
<div
  class="fixed bg-slate-600 bottom-0 left-1/2 transform -translate-x-1/2 mb-4 z-[999] flex flex-row gap-1 p-2 rounded-full"
>
  <app-search></app-search>
  <app-up-button></app-up-button>
</div>
<div>
  <app-drawer-cookies></app-drawer-cookies>
</div>
