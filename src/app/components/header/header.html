<!-- Modern Marcha UI Header -->
<div class="fixed top-0 left-0 right-0 z-[1000] header-wrapper">
  <m-menubar
    [items]="menubarItems"
    logo="logos/principal.jpg"
    [fullWidth]="true"
    [contained]="true"
    (itemClick)="onMenuItemClick($event)"
    (logoClick)="onLogoClick()"
  >
    <div class="flex items-center gap-3">
      <!-- Dark/Light Toggle - usar botón simple por ahora -->
      <m-button
        [icon]="isDarkMode ? 'lucide:moon' : 'lucide:sun'"
        variant="text"
        [rounded]="true"
        (onClick)="toggleDarkMode()"
      />

      <!-- Cart with badge -->
      <div class="relative">
        @if (itemsCartCount() > 0) {
          <m-overlay-badge [value]="itemsCartCount()" severity="danger">
            <m-button
              icon="lucide:shopping-cart"
              variant="text"
              [rounded]="true"
              (onClick)="showDialog()"
            />
          </m-overlay-badge>
        } @else {
          <m-button
            icon="lucide:shopping-cart"
            variant="text"
            [rounded]="true"
            (onClick)="showDialog()"
          />
        }
      </div>

      <!-- User Menu -->
      @if (isLogged()) {
        <div class="relative">
          <m-button
            icon="lucide:user"
            severity="help"
            variant="filled"
            [rounded]="true"
            (onClick)="toggleUserMenu()"
          />
          @if (showUserMenu) {
            <div class="absolute right-0 top-12 min-w-[200px] user-menu-dropdown">
              <m-card variant="solid" padding="sm">
                <div class="flex flex-col gap-2">
                  <m-button
                    label="Perfil"
                    icon="lucide:user-circle"
                    variant="text"
                    [full]="true"
                    (onClick)="onProfileClick()"
                  />
                  <m-button
                    label="Cerrar sesión"
                    icon="lucide:log-out"
                    variant="text"
                    severity="danger"
                    [full]="true"
                    (onClick)="onLogoutClick()"
                  />
                </div>
              </m-card>
            </div>
          }
        </div>
      } @else {
        <m-button
          [label]="_isMobile() ? '' : 'Iniciar sesión'"
          icon="lucide:log-in"
          variant="outlined"
          size="small"
          (onClick)="onLoginClick()"
        />
      }

      <!-- Language Toggle — visible solo en desktop (md:flex = min-width: 768px) -->
      <div class="hidden md:flex">
        <m-button
          icon="lucide:globe"
          variant="text"
          [rounded]="true"
          (onClick)="toggleLanguage()"
        />
      </div>
    </div>
  </m-menubar>
</div>

<!-- Cart Dialog -->
<m-dialog
  [(visible)]="visible"
  [closeable]="true"
  header="Carrito de compras"
  size="lg"
>
  <div class="p-6">
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-2xl font-bold">{{'cart.title' | translate}}</h2>
      <div class="text-xl">
        <span class="text-gray-500">Total:</span>
        <span class="text-primary font-bold ml-2">{{totalAmount()?.toFixed(2)}} €</span>
      </div>
    </div>
    
    <app-cart></app-cart>

    <div class="mt-6 flex flex-col gap-3">
      <m-button
        [label]="'cart.checkout_button' | translate"
        severity="primary"
        [full]="true"
        size="large"
      />
      <m-button
        label="Vaciar carrito"
        variant="outlined"
        severity="danger"
        [full]="true"
        (onClick)="clearCart()"
      />
    </div>
  </div>
</m-dialog>

<app-up-button />
<app-drawer-cookies />
