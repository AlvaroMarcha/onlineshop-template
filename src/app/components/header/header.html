<div class="card">
  <p-menubar [model]="items">
    <ng-template pTemplate="start">
      <p-image
        class="rounded-full"
        id="principal-logo"
        src="logos/principal.jpg"
        alt="Principal logo"
        width="50"
      />
    </ng-template>
    <ng-template pTemplate="end">
      <button class="stl-button pi pi-user" style="font-size: 1.4rem"></button>
    </ng-template>
  </p-menubar>
</div>
