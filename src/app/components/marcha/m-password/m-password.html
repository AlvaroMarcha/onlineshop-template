<div
  class="m-field"
  [class.is-focused]="isFocused()"
  [class.is-invalid]="invalid"
  [class.is-disabled]="isDisabled()"
>
  @if (label) {
    <label class="m-field-label">{{ label }}</label>
  }
  <div class="m-field-body">
    <input
      class="m-field-el"
      [type]="showPassword() ? 'text' : 'password'"
      [placeholder]="placeholder"
      [value]="value()"
      [disabled]="isDisabled()"
      (input)="onInput($event)"
      (focus)="onFocus()"
      (blur)="onBlur()"
    />
    <button
      type="button"
      class="m-pwd-toggle"
      (click)="toggleVisibility()"
      [disabled]="isDisabled()"
      [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
    >
      <m-icon [icon]="showPassword() ? 'lucide:eye-off' : 'lucide:eye'" size="16" />
    </button>
  </div>
  @if (hint) {
    <span class="m-field-hint" [class.m-field-hint--invalid]="invalid">{{ hint }}</span>
  }
</div>
